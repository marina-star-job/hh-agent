name: HH Agent

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  run_agent:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install requests

      - name: Write hh config
        run: |
          mkdir -p ~/.config/hh-applicant-tool
          echo '{"token":{"access_token":"${{ secrets.HH_ACCESS_TOKEN }}","refresh_token":"${{ secrets.HH_REFRESH_TOKEN }}"}}' > ~/.config/hh-applicant-tool/config.json

      - name: Run agent
        env:
          HH_ACCESS_TOKEN: ${{ secrets.HH_ACCESS_TOKEN }}
          GPT_MODELS_TOKEN: ${{ secrets.GPT_MODELS_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python agent.py
